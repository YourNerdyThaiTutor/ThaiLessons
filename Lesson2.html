                <meta charset="UTF-8" />
                <title>Where does the vowel go</title>
                <style>
        .box {
          float: left;
          width: 100px;
          height: 100px;
          margin: 10px;
          padding: 10px;
          border: 1px solid black;
          text-align: center;
        }
        .box {
          padding: 5px 5px;
          border-radius: 15px;
          cursor: pointer;
          border: 0;
          background-color: white;
          box-shadow: rgb(0 0 0 / 5%) 0 0 8px;
          letter-spacing: 1.5px;
          text-transform: uppercase;
          font-size: 30px;
          transition: all 0.5s ease;
        }

        .box:hover {
          letter-spacing: 3px;
          background-color: hsl(261deg 80% 48%);
          color: hsl(0, 0%, 100%);
          box-shadow: rgb(93 24 220) 0px 7px 29px 0px;
        }

        .box:active {
          letter-spacing: 3px;
          background-color: hsl(261deg 80% 48%);
          color: hsl(0, 0%, 100%);
          box-shadow: rgb(93 24 220) 0px 0px 0px 0px;
          transform: translateY(10px);
          transition: 100ms;
        }            
        .con{
            font-size: 100px;
            text-align: center;
        }
        .dragElement, .dropZone {
          width: 12rem;
          height: 15rem;
          border-radius: 10px;
          display: flex;
          align-items: center;
          justify-content: center;
          text-align: center;
          background: rgba( 255, 255, 255, 0.9 );
        backdrop-filter: blur( 4px );
        -webkit-backdrop-filter: blur( 4px );
        border-radius: 10px;
          transition: 0.3s;
        }

        .dropZone {
          width: 13rem;
          height: 16rem;
          background: rgba( 0, 0, 0, 0.7 );
        backdrop-filter: blur( 4.5px );
        -webkit-backdrop-filter: blur( 4.5px );
        border-radius: 10px;
        }

        .beingDragged {
        color: white;
          background-color: #9d9d9d;
        }

        .hoverOver {
          transition: 0.3s ease-out;
          border: solid 5px #2a9d8f;
        }

        #Draggable {
          touch-action: none;   /* CRITICAL: Stops the page from bouncing/scrolling */
          user-select: none;    /* Prevents highlighting text while dragging */
          position: relative;   /* Allows us to move it with JS */
          z-index: 1000;        /* Ensures it stays on top of other boxes */
        }

        .hoverOver {
          border: solid 5px #2a9d8f !important; /* Highlights the target box */
        }

            <script>
                var streak = 0;
                var answer="เ";
                var vowels = {
                "ี":"above",
                "เ":"left",
                "แ":"left",
                "า":"right",
                "ู":"under"
                }
                function generateQuestion(){
                  document.getElementById("streak").textContent = "Streak: "+streak;
                  var c = Math.floor(Math.random() * consonants.length);
                  var v = Math.floor(Math.random() * vowels_list.length);
                  document.getElementById("consonant").innerHTML = consonants[c];
                  answer = vowels_list[v];
                  document.getElementById("Draggable").innerHTML = answer;
                }
                
                function SetPage(){
                  document.body.innerHTML = `
<h1>Drag and drop the vowel to the correct placement</h1>
<p id="streak">Streak: 0</p>      
<table>
    <tr>
        <td></td>
        <td><div id="above" class="box"></div></td>
        <td></td>
    </tr>
    <tr>
        <td><div id="left" class="box"></div></td>
        <td class="con" id="consonant"></td>
        <td><div id="right" class="box"></div></td>
    </tr>
    <tr>
        <td></td>
        <td><div id="under" class="box"></div></td>
        <td></td>
    </tr>
</table>
<div id="div1" class="box" style="margin: 0 auto; float: none;">
    <div id="Draggable" class="con">Sa</div>
</div>`;

    // Attach the new event listeners right here
    const dragEl = document.getElementById("Draggable");
    dragEl.onpointerdown = startDrag;
    dragEl.onpointermove = moveDrag;
    dragEl.onpointerup = endDrag;
    dragEl.onpointercancel = endDrag;
    generateQuestion();
}

let isDragging = false;
let startX, startY;

function startDrag(ev) {
    isDragging = true;
    startX = ev.clientX;
    startY = ev.clientY;
    ev.target.setPointerCapture(ev.pointerId); // Locks the input to this element
    ev.target.classList.add('beingDragged');
}

function moveDrag(ev) {
    if (!isDragging) return;
    const el = ev.target;
    const dx = ev.clientX - startX;
    const dy = ev.clientY - startY;
    
    // Move the element under the finger/cursor
    el.style.transform = `translate(${dx}px, ${dy}px)`;

    // Logic to highlight the box you are currently hovering over
    const target = getElementUnderPointer(ev.clientX, ev.clientY);
    document.querySelectorAll('.box').forEach(b => b.classList.remove('hoverOver'));
    if (target && target.classList.contains('box') && target.id !== 'div1') {
        target.classList.add('hoverOver');
    }
}

function endDrag(ev) {
    if (!isDragging) return;
    isDragging = false;
    const el = ev.target;
    const dropZone = getElementUnderPointer(ev.clientX, ev.clientY);
    
    el.style.transform = 'none'; // Reset position so it snaps into the box
    el.classList.remove('beingDragged');

    if (dropZone && dropZone.classList.contains('box') && dropZone.id !== 'div1') {
        // Reuse your existing logic for checking if the answer is correct
        processDrop(dropZone, el); 
    }
}

function getElementUnderPointer(x, y) {
    const el = document.getElementById("Draggable");
    el.style.visibility = 'hidden'; // Hide vowel for a millisecond to see what's under it
    const target = document.elementFromPoint(x, y);
    el.style.visibility = 'visible';
    return target;
}

function processDrop(target, el) {
    target.appendChild(el);
    if (vowels[answer] === target.id) {
        target.style.background = '#00ff00';
        streak++;
        updateStreakLocalStorage(streak);
        setTimeout(() => SetPage(), 700);
    } else {
        target.style.background = '#ff003c';
        streak = 0;
        document.getElementById("streak").textContent = "Streak: 0";
    }
}

  function updateStreakLocalStorage(streak){

    try{

      const url = window.location.href; 
      const filename = url.substring(url.lastIndexOf('/') + 1); // ex: "Lesson1.html"
      const lessonName = filename.replace('.html', '');         //ex: "Lesson1"

      let gameData = localStorage.getItem(lessonName)

      if(!gameData){
          //initialize it
          gameData = "0"
      }

      //turn string into Number and increment
      gameData = Number(gameData)
      gameData = streak > gameData ? streak : gameData   
      localStorage.setItem(lessonName + "Streak", gameData.toString())

    }catch{
      console.log("couldn't get url name")
    }
  }

     var vowels_list=[ "ี","เ","แ","า", "ู"]
     var consonants =["ก","จ","ด","ต","บ","ป","อ"];
     window.onload = function load(){
         SetPage();
         
         
     }
     
</script>

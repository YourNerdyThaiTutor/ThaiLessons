    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@200;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-noir: #030305;
            --cell-bg: #1a1a1e; /* Distinct from background */
            --neon-cyan: #00f2ff;
            --cyan-glow: rgba(0, 242, 255, 0.3);
            --neon-pink: #ff00ff;
            --text-main: #fff;
            --text-muted: #666;
            --cell-border: rgba(255, 255, 255, 0.1);
            --thai-font: "Leelawadee UI", "Tahoma", "Thonburi", sans-serif;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-noir);
            background-image: radial-gradient(at 50% 50%, rgba(30, 0, 50, 0.4) 0px, transparent 60%);
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; 
            padding: 15px; min-height: 100vh; margin: 0;
            box-sizing: border-box;
        }

        header { text-align: center; margin-bottom: 20px; text-transform: uppercase; width: 100%; }
        h1 { 
            font-family: 'Syncopate', sans-serif; font-size: 2.2rem; letter-spacing: -1px;
            background: linear-gradient(to bottom, var(--text-main) 60%, var(--neon-cyan) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0; filter: drop-shadow(0 0 10px var(--cyan-glow));
        }

        .controls { display: flex; gap: 10px; margin-top: 15px; justify-content: center; }
        .btn {
            background: transparent; border: 1px solid var(--neon-pink); color: var(--neon-pink);
            padding: 8px 20px; font-size: 0.6rem; letter-spacing: 2px; cursor: pointer;
            font-family: 'Syncopate'; font-weight: 700; transition: 0.3s;
        }
        .btn:hover { background: var(--neon-pink); color: #000; }
        .btn-manifest { border-color: var(--text-muted); color: var(--text-muted); }
        .btn-manifest.active { color: var(--neon-cyan); border-color: var(--neon-cyan); }

        /* Main Container Layout */
        #game-container { 
            display: flex; flex-direction: column; align-items: center; 
            gap: 25px; width: 100%; max-width: 800px;
        }

        /* The Grid */
        #crossword-grid {
            display: grid; 
            grid-template-columns: repeat(15, 6vw); /* Larger on mobile */
            grid-template-rows: repeat(15, 6vw);
            background: #000; border: 2px solid #111; padding: 5px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .cell { 
            width: 100%; height: 100%; 
            background: var(--cell-bg); /* High contrast color */
            position: relative; border: 1px solid var(--cell-border); 
        }
        .cell.black { background: #050505; border: 1px solid #000; }
        
        .cell input {
            width: 100%; height: 100%; border: none; text-align: center;
            font-size: 1.1rem; color: #fff; background: transparent; outline: none; font-family: var(--thai-font);
        }
        .cell .num { position: absolute; top: 1px; left: 2px; font-size: 7px; color: var(--neon-cyan); font-weight: 700; pointer-events: none; }

        /* Clues Section: Two Columns on Mobile */
        .clues-wrapper { 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* Force 2 columns */
            gap: 20px; width: 100%; 
            padding: 15px; border-top: 1px solid var(--neon-pink);
            box-sizing: border-box;
        }
        .clue-section-header { 
            font-family: 'Syncopate', sans-serif; font-size: 0.6rem; color: var(--neon-cyan); 
            border-bottom: 1px solid var(--neon-cyan); padding-bottom: 5px; margin-bottom: 10px; letter-spacing: 2px; 
        }
        .clue-item { padding: 4px 0; font-size: 0.75rem; color: #888; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .clue-item.correct { color: var(--neon-pink); font-weight: 600; }

        /* Tablet/Desktop Override */
        @media (min-width: 768px) {
            #crossword-grid {
                grid-template-columns: repeat(15, 42px);
                grid-template-rows: repeat(15, 42px);
            }
            #game-container { flex-direction: row; align-items: flex-start; }
            .clues-wrapper { grid-template-columns: 1fr; width: 300px; border-top: none; border-left: 1px solid var(--neon-pink); }
            h1 { font-size: 3rem; }
        }

        #success-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 3, 5, 0.98); backdrop-filter: blur(20px);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
    </style>

<body>

    <header>
        <h1>THAI VOCAB</h1>
        <div class="controls">
            <button class="btn" onclick="location.reload()">NEW GAME</button>
            <button class="btn btn-manifest" id="manifest-toggle" onclick="toggleManifest()">CHEAT</button>
        </div>
    </header>

    <div id="game-container">
        <div id="crossword-grid"></div>
        <div class="clues-wrapper">
            <div class="across-container">
                <div class="clue-section-header">ACROSS</div>
                <div id="across-clues"></div>
            </div>
            <div class="down-container">
                <div class="clue-section-header">DOWN</div>
                <div id="down-clues"></div>
            </div>
        </div>
    </div>

    <div id="success-overlay">
        <h2 style="font-family: 'Syncopate'; color: var(--neon-pink); font-size: 3rem;">ELITE</h2>
        <p style="letter-spacing: 4px; color: var(--neon-cyan);">MISSION COMPLETE</p>
        <button class="btn" onclick="location.reload()">REPLAY</button>
    </div>

<script>
// Logic remains strictly path-based as per previous request
const SIZE = 15;
const MAX_WORDS = 15;
const MIN_WORDS = 5;
window.currentPlaced = [];
window.manifestActive = false;

function splitThaiStrict(w) {
    return w.match(/[\u0E00-\u0E7F][\u0E31\u0E34-\u0E3A\u0E47-\u0E4E]*|[\u0E30-\u0E33\u0E40-\u0E46]/g) || [];
}

function isPureConsonant(char) {
    if (!char || char.length > 1) return false;
    const code = char.charCodeAt(0);
    return (code >= 0x0E01 && code <= 0x0E2E);
}

function generate() {
    const allWords = vocabWords.trim().split('\n').map(line => {
        const [word, clue] = line.split(',');
        return { full: word.trim(), split: splitThaiStrict(word.trim()), clue: clue.trim() };
    });

    let grid, placed;
    let attempts = 0;

    while (attempts < 1000) {
        grid = Array(SIZE).fill().map(() => Array(SIZE).fill(null));
        placed = [];
        let pool = [...allWords].sort(() => Math.random() - 0.5);
        const first = pool.pop();
        addWordToGrid(first, 7, 3, 'across', grid, placed);

        for (let pass = 0; pass < 20; pass++) {
            if (placed.length >= MAX_WORDS) break;
            for (let i = 0; i < pool.length; i++) {
                if (tryToFit(pool[i], grid, placed)) {
                    pool.splice(i, 1);
                    i--;
                }
            }
        }
        if (placed.length >= MIN_WORDS) break;
        attempts++;
    }
    render(grid, placed);
}

function tryToFit(wordObj, grid, placed) {
    const chars = wordObj.split;
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            if (grid[r][c] && isPureConsonant(grid[r][c].char)) {
                for (let i = 0; i < chars.length; i++) {
                    if (chars[i] === grid[r][c].char) {
                        if (checkPath(chars, r - i, c, 'down', grid, i)) {
                            addWordToGrid(wordObj, r - i, c, 'down', grid, placed);
                            return true;
                        }
                        if (checkPath(chars, r, c - i, 'across', grid, i)) {
                            addWordToGrid(wordObj, r, c - i, 'across', grid, placed);
                            return true;
                        }
                    }
                }
            }
        }
    }
    return false;
}

function checkPath(chars, r, c, dir, grid, intersectIndex) {
    if (r < 0 || c < 0 || (dir === 'across' && c + chars.length > SIZE) || (dir === 'down' && r + chars.length > SIZE)) return false;
    const beforeR = dir === 'down' ? r - 1 : r, beforeC = dir === 'across' ? c - 1 : c;
    const afterR = dir === 'down' ? r + chars.length : r, afterC = dir === 'across' ? c + chars.length : c;
    if (beforeR >= 0 && beforeC >= 0 && grid[beforeR][beforeC]) return false;
    if (afterR < SIZE && afterC < SIZE && grid[afterR][afterC]) return false;

    let intersections = 0;
    for (let i = 0; i < chars.length; i++) {
        const currR = dir === 'across' ? r : r + i, currC = dir === 'across' ? c + i : c;
        if (grid[currR][currC]) {
            if (i !== intersectIndex || grid[currR][currC].char !== chars[i]) return false;
            intersections++;
        } else {
            const neighbors = dir === 'across' ? [[currR - 1, currC], [currR + 1, currC]] : [[currR, currC - 1], [currR, currC + 1]];
            for (const [nr, nc] of neighbors) {
                if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && grid[nr][nc]) return false;
            }
        }
    }
    return intersections === 1;
}

function addWordToGrid(wordObj, r, c, dir, grid, placed) {
    const chars = wordObj.split;
    for (let i = 0; i < chars.length; i++) {
        const row = dir === 'across' ? r : r + i, col = dir === 'across' ? c + i : c;
        if (!grid[row][col]) grid[row][col] = { char: chars[i], num: null };
    }
    if (!grid[r][c].num) grid[r][c].num = Math.max(0, ...placed.map(p => p.num)) + 1;
    placed.push({ ...wordObj, r, c, dir, num: grid[r][c].num });
}

function render(grid, placed) {
    window.currentPlaced = placed;
    const container = document.getElementById('crossword-grid');
    container.innerHTML = '';
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell ' + (grid[r][c] ? '' : 'black');
            if (grid[r][c]) {
                if (grid[r][c].num) cell.innerHTML = `<span class="num">${grid[r][c].num}</span>`;
                const input = document.createElement('input');
                input.dataset.r = r; input.dataset.c = c;
                input.dataset.ans = grid[r][c].char;
                input.oninput = checkWin;
                cell.appendChild(input);
            }
            container.appendChild(cell);
        }
    }
    const acList = document.getElementById('across-clues'), dnList = document.getElementById('down-clues');
    acList.innerHTML = ''; dnList.innerHTML = '';
    placed.sort((a,b) => a.num - b.num).forEach(p => {
        const div = document.createElement('div');
        div.className = 'clue-item';
        div.id = `clue-${p.num}-${p.dir}`;
        div.innerText = `${p.num}. ${p.clue}`;
        (p.dir === 'across' ? acList : dnList).appendChild(div);
    });
}

function checkWin() {
    let win = true;
    window.currentPlaced.forEach(p => {
        let user = "";
        for (let i = 0; i < p.split.length; i++) {
            const row = p.dir === 'across' ? p.r : p.r + i, col = p.dir === 'across' ? p.c + i : p.c;
            user += document.querySelector(`input[data-r="${row}"][data-c="${col}"]`).value;
        }
        const isCorrect = (user === p.full);
        document.getElementById(`clue-${p.num}-${p.dir}`).classList.toggle('correct', isCorrect);
        if (!isCorrect) win = false;
    });
    if (win) document.getElementById('success-overlay').style.display = 'flex';
}

function toggleManifest() {
    window.manifestActive = !window.manifestActive;
    document.getElementById('manifest-toggle').classList.toggle('active');
    document.querySelectorAll('input').forEach(i => i.placeholder = window.manifestActive ? i.dataset.ans : "");
}

window.onload = generate;
</script>
</body>

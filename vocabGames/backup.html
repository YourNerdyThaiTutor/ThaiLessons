    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-noir: #030305;
            --cell-bg: #1c2025;
            --neon-cyan: #00f2ff;
            --neon-pink: #ff00ff;
            --neon-green: #39ff14;
            --neon-orange: #ff9900;
            --text-main: #fff;
            --kbd-key: #3a3a3c;
            --thai-font: "Leelawadee UI", "Tahoma", "Thonburi", sans-serif;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-noir);
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; 
            padding: 10px; min-height: 100vh; margin: 0;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        header { text-align: center; margin-bottom: 5px; }
        h1 { 
            font-family: 'Syncopate', sans-serif; font-size: 1.2rem;
            background: linear-gradient(to bottom, #fff 60%, var(--neon-cyan) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 5px 0;
        }

        #board { display: grid; grid-template-rows: repeat(6, 1fr); gap: 5px; margin-bottom: 15px; }
        .row { display: grid; grid-template-columns: repeat(5, 50px); gap: 5px; }
        .tile {
            width: 50px; height: 50px; border: 2px solid #333; background: var(--cell-bg);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--thai-font); font-size: 1.4rem; font-weight: bold; transition: all 0.2s;
        }
        .tile.focused { border-color: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }

        .controls { display: flex; gap: 15px; margin-bottom: 20px; justify-content: center; }
        .btn {
            background: transparent; border: 1px solid var(--neon-pink); color: var(--neon-pink);
            padding: 10px 20px; font-family: 'Syncopate'; font-size: 0.6rem; cursor: pointer;
            transition: 0.2s; text-decoration: none; text-transform: uppercase;
        }
        .btn:hover { background: var(--neon-pink); color: #000; box-shadow: 0 0 10px var(--neon-pink); }

        #keyboard-area { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 12px; }
        .kb-label { font-family: 'Syncopate'; font-size: 0.55rem; color: var(--neon-cyan); margin-bottom: 5px; display: block; letter-spacing: 1px; }
        .keyboard { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
        
        .key {
            background: var(--kbd-key); color: #fff; height: 42px; border-radius: 4px; cursor: pointer;
            font-family: var(--thai-font); font-size: 1rem; display: flex; align-items: center; justify-content: center;
            transition: 0.1s; user-select: none;
        }
        .key.special { background: #555; font-family: 'Montserrat'; font-size: 0.65rem; font-weight: bold; }

        .correct { background: var(--neon-green) !important; color: #000 !important; border-color: var(--neon-green) !important; }
        .partial { background: var(--neon-orange) !important; color: #000 !important; border-color: var(--neon-orange) !important; }
        .present { background: var(--neon-cyan) !important; color: #000 !important; border-color: var(--neon-cyan) !important; }
        .absent { background: #111 !important; opacity: 0.5; border-color: #222 !important; }

        .action-row { width: 100%; max-width: 550px; margin-bottom: 15px; } /* Changed margin-top to margin-bottom */
        .enter-btn-large {
            width: 100%; height: 60px; background: transparent; border: 2px solid var(--neon-green);
            color: var(--neon-green); font-family: 'Syncopate'; font-size: 1rem; border-radius: 10px; cursor: pointer;
            transition: 0.2s;
        }
        .enter-btn-large:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); }

        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); padding: 20px; text-align: center;
        }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; width: 100%; max-width: 300px; }
        .stat-box { font-family: 'Syncopate'; font-size: 0.7rem; color: var(--neon-cyan); }
        .stat-num { display: block; font-size: 1.5rem; color: white; margin-top: 5px; }

        @media (max-width: 480px) {
            .row { grid-template-columns: repeat(5, 17vw); }
            .tile { width: 17vw; height: 17vw; }
            .keyboard { grid-template-columns: repeat(7, 1fr); }
            .key { height: 38px; font-size: 0.85rem; }
        }

<body>

    <div id="overlay">
        <h2 id="result-title" style="font-family:'Syncopate'; font-size: 2rem;">RESULT</h2>
        <p style="margin-top:10px; font-family:'Montserrat';">The word was:<br>
           <span id="result-word" style="color:var(--neon-pink); font-family:var(--thai-font); font-size: 2.2rem;"></span>
        </p>
        
        <div id="stats-display" class="stats-grid"></div>

        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="initGame()">PLAY AGAIN</button>
            <button class="btn" style="border-color:#777; color:#ccc;" onclick="document.getElementById('overlay').style.display='none'">CLOSE</button>
        </div>
    </div>

    <header><h1>THAI WORD MATCH</h1></header>

    <div id="board"></div>

    <div class="controls">
        <button class="btn" onclick="initGame()">NEW GAME</button>
        <a href="https://yournerdythaitutor.github.io/Lessons/" target="_blank" class="btn">STUDY</a>
    </div>

    <div class="action-row">
        <button class="enter-btn-large" onclick="handleKey('Enter')">SUBMIT GUESS</button>
    </div>

    <div id="keyboard-area">
        <div class="kb-section">
            <span class="kb-label">Consonants</span>
            <div class="keyboard" id="kb-consonants"></div>
        </div>
        <div class="kb-section">
            <span class="kb-label">Vowels & Tones</span>
            <div class="keyboard" id="kb-details"></div>
        </div>
    </div>

<script>
let targetWord = [], targetFull = "", currentGuessParts = ["", "", "", "", ""], keyStates = {};
let focusIndex = 0, currentRow = 0, gameOver = false;

const WORD_LENGTH = 5, MAX_GUESSES = 6;
const consonants = "กขฃคฅฆงจฉชซฌญฎฏฐฑฒณดตถทธนบปผฝพฟภมยรลวศษสหฬอฮ".split("");
// UPDATED: Included Mai Han-Akat (ั)
const details = "ะาำิีึืเแโใไ็่้๊๋์ํัุู".split("");

function splitThaiStrict(w) {
    return w.match(/[\u0E00-\u0E7F][\u0E31\u0E34-\u0E3A\u0E47-\u0E4E]*|[\u0E30-\u0E33\u0E40-\u0E46]/g) || [];
}

function isCombining(char) {
    const code = char.charCodeAt(0);
    if (char === 'ำ') return false; 
    // UPDATED: Explicitly check for Mai Han-Akat (0x0E31) so it combines in the tile
    return (code === 0x0E31) || (code >= 0x0E34 && code <= 0x0E3A) || (code >= 0x0E47 && code <= 0x0E4E);
}

function initGame() {
    const list = (typeof vocabWords !== 'undefined') ? vocabWords.trim().split('\n') : ["ภาษา,Language"];
    const validWords = list.map(line => line.split(',')[0].trim()).filter(w => splitThaiStrict(w).length === WORD_LENGTH);
    
    if (validWords.length === 0) {
        targetFull = "ภาษา"; 
    } else {
        targetFull = validWords[Math.floor(Math.random() * validWords.length)];
    }
    
    targetWord = splitThaiStrict(targetFull);

    console.log("DEBUG: Target Word -> ", targetFull);

    currentRow = 0; currentGuessParts = ["", "", "", "", ""]; keyStates = {}; focusIndex = 0; gameOver = false;
    document.getElementById('overlay').style.display = 'none';
    buildBoard();
    renderKeyboards();
    updateFocus();
}

function buildBoard() {
    const board = document.getElementById('board'); board.innerHTML = '';
    for (let i = 0; i < MAX_GUESSES; i++) {
        const row = document.createElement('div'); row.className = 'row';
        for (let j = 0; j < WORD_LENGTH; j++) {
            const tile = document.createElement('div'); tile.className = 'tile';
            tile.id = `tile-${i}-${j}`;
            tile.onclick = () => { if (i === currentRow && !gameOver) { focusIndex = j; updateFocus(); } };
            row.appendChild(tile);
        }
        board.appendChild(row);
    }
}

function renderKeyboards() {
    const fill = (id, list, addDel) => {
        const el = document.getElementById(id); el.innerHTML = '';
        list.forEach(char => {
            const k = document.createElement('div');
            k.className = `key ${keyStates[char] || ''}`;
            k.innerText = char;
            k.onclick = () => handleKey(char);
            el.appendChild(k);
        });
        if(addDel) {
            const del = document.createElement('div');
            del.className = 'key special'; del.innerText = 'DEL';
            del.onclick = () => handleKey('Backspace');
            el.appendChild(del);
        }
    };
    fill('kb-consonants', consonants, false);
    fill('kb-details', details, true);
}

function handleKey(key) {
    if (gameOver) return;
    if (key === 'Enter') {
        if (currentGuessParts.every(p => p !== "")) submitGuess();
    } else if (key === 'Backspace') {
        let cur = currentGuessParts[focusIndex];
        if (cur.length > 1) currentGuessParts[focusIndex] = cur.slice(0, -1);
        else { currentGuessParts[focusIndex] = ""; if (focusIndex > 0) focusIndex--; }
        updateBoardVisuals();
    } else {
        if (isCombining(key)) {
            if (currentGuessParts[focusIndex] !== "") currentGuessParts[focusIndex] += key;
        } else {
            currentGuessParts[focusIndex] = key;
            if (focusIndex < WORD_LENGTH - 1) focusIndex++;
        }
        updateBoardVisuals();
    }
}

function updateBoardVisuals() {
    for (let j = 0; j < WORD_LENGTH; j++) {
        document.getElementById(`tile-${currentRow}-${j}`).innerText = currentGuessParts[j];
    }
    updateFocus();
}

function updateFocus() {
    document.querySelectorAll('.tile').forEach(t => t.classList.remove('focused'));
    const current = document.getElementById(`tile-${currentRow}-${focusIndex}`);
    if (current) current.classList.add('focused');
}

function submitGuess() {
    const tiles = [];
    for (let j = 0; j < WORD_LENGTH; j++) tiles.push(document.getElementById(`tile-${currentRow}-${j}`));
    
    let remainingTarget = [...targetWord];
    let guess = [...currentGuessParts];

    const setKeyState = (char, state) => {
        const priority = { 'correct': 4, 'partial': 3, 'present': 2, 'absent': 1 };
        if (!keyStates[char] || priority[state] > priority[keyStates[char]]) {
            keyStates[char] = state;
        }
    };

    guess.forEach((char, i) => {
        if (char === targetWord[i]) {
            tiles[i].classList.add('correct');
            char.split('').forEach(c => setKeyState(c, 'correct'));
            remainingTarget[i] = null;
        }
    });

    guess.forEach((char, i) => {
        if (tiles[i].classList.contains('correct')) return;
        
        const baseGuess = char[0];
        const baseTargetAtPos = targetWord[i] ? targetWord[i][0] : null;

        if (baseGuess === baseTargetAtPos && baseGuess !== undefined) {
            tiles[i].classList.add('partial');
            setKeyState(baseGuess, 'correct');
            char.split('').slice(1).forEach(mark => {
                if (targetWord[i].includes(mark)) setKeyState(mark, 'correct');
                else if (targetFull.includes(mark)) setKeyState(mark, 'present');
                else setKeyState(mark, 'absent');
            });
            remainingTarget[i] = null; 
        } 
        else {
            let foundIdx = remainingTarget.indexOf(char);
            if (foundIdx !== -1) {
                tiles[i].classList.add('present');
                char.split('').forEach(c => setKeyState(c, 'present'));
                remainingTarget[foundIdx] = null;
            } else {
                tiles[i].classList.add('absent');
                char.split('').forEach(c => {
                    if (targetFull.includes(c)) setKeyState(c, 'present');
                    else setKeyState(c, 'absent');
                });
            }
        }
    });

    renderKeyboards();
    if (guess.join('') === targetFull) finalize(true);
    else if (currentRow === MAX_GUESSES - 1) finalize(false);
    else { currentRow++; currentGuessParts = ["", "", "", "", ""]; focusIndex = 0; updateFocus(); }
}

function finalize(win) {
    gameOver = true;
    
    let stats = JSON.parse(localStorage.getItem('thaiWordleStats')) || { wins: 0, total: 0, guessHistory: [] };
    stats.total++;
    if (win) { 
        stats.wins++; 
        stats.guessHistory.push(currentRow + 1); 
    }
    localStorage.setItem('thaiWordleStats', JSON.stringify(stats));

    const winPct = Math.round((stats.wins / stats.total) * 100);
    const avgGuesses = stats.guessHistory.length > 0 ? (stats.guessHistory.reduce((a, b) => a + b, 0) / stats.guessHistory.length).toFixed(1) : 0;

    const overlay = document.getElementById('overlay');
    document.getElementById('result-title').innerText = win ? "YOU WIN" : "YOU LOSE";
    document.getElementById('result-title').style.color = win ? "var(--neon-green)" : "var(--neon-pink)";
    document.getElementById('result-word').innerText = targetFull;
    
    document.getElementById('stats-display').innerHTML = `
        <div class="stat-box">WIN RATE <span class="stat-num">${winPct}%</span></div>
        <div class="stat-box">AVG GUESSES <span class="stat-num">${avgGuesses}</span></div>
    `;
    
    overlay.style.display = 'flex';
}

window.onload = initGame;
</script>
</body>
</html>

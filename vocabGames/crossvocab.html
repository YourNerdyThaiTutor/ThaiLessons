    <style>
        :root {
            --bg-noir: #030305;
            --cell-bg: #1c2025;
            --neon-cyan: #00f2ff;
            --cyan-glow: rgba(0, 242, 255, 0.3);
            --neon-pink: #ff00ff;
            --text-main: #fff;
            --text-muted: #444;
            --cell-border: rgba(255, 255, 255, 0.1);
            --thai-font: "Leelawadee UI", "Tahoma", "Thonburi", sans-serif;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-noir);
            background-image: radial-gradient(at 50% 50%, rgba(30, 0, 50, 0.4) 0px, transparent 60%);
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; 
            padding: 10px; min-height: 100vh; margin: 0;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        header { text-align: center; margin-bottom: 15px; width: 100%; transition: opacity 0.3s; }
        h1 { 
            font-family: 'Syncopate', sans-serif; font-size: 1.8rem; letter-spacing: -1px;
            background: linear-gradient(to bottom, var(--text-main) 60%, var(--neon-cyan) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0; filter: drop-shadow(0 0 10px var(--cyan-glow));
        }

        .controls { display: flex; gap: 8px; margin-top: 10px; justify-content: center; }
        .btn {
            background: transparent; border: 1px solid var(--neon-pink); color: var(--neon-pink);
            padding: 6px 15px; font-size: 0.55rem; letter-spacing: 2px; cursor: pointer;
            font-family: 'Syncopate'; font-weight: 700; transition: 0.3s;
        }
        .btn:hover { background: var(--neon-pink); color: #000; box-shadow: 0 0 15px var(--neon-pink); }

        /* Specific style for the study link */
        .btn-study {
            border-color: var(--neon-pink); /* Matches New Game button */
            color: var(--neon-pink);        /* Matches New Game button */
            text-decoration: none;         /* Removes the underline */
        }

        .btn-study:hover {
            background: var(--neon-pink);
            color: #000;
            box-shadow: 0 0 15px var(--neon-pink);
        }
        
        #game-container { 
            display: flex; flex-direction: column; align-items: center; 
            gap: 20px; width: 100%; max-width: 1000px;
            transition: opacity 0.4s ease;
        }

        #crossword-grid {
            display: grid; 
            grid-template-columns: repeat(15, 6.2vw); 
            grid-template-rows: repeat(15, 6.2vw);
            background: #000; border: 1px solid #222; padding: 2px;
        }

        .cell { 
            width: 100%; height: 100%; 
            background: var(--cell-bg); 
            position: relative; border: 1px solid var(--cell-border);
            display: flex; align-items: center; justify-content: center;
        }
        .cell.black { background: #000; border: 1px solid transparent; }
        
        .cell input {
            width: 100%; height: 100%; border: none; 
            text-align: center; outline: none;
            background: transparent; color: #fff;
            font-family: var(--thai-font); font-size: 1.1rem;
            padding: 0; margin: 0; line-height: 1;
        }

        .cell .num { 
            position: absolute; top: 1px; left: 2px; 
            font-size: 10px; color: var(--neon-cyan); 
            font-family: 'Syncopate'; font-weight: 700; pointer-events: none; 
        }

        .clues-wrapper { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 15px; width: 100%; padding: 15px; 
            border-top: 1px solid var(--neon-pink);
        }
        .clue-section-header { 
            font-family: 'Syncopate'; font-size: 1.3rem; color: var(--neon-cyan); 
            border-bottom: 1px solid var(--neon-cyan); margin-bottom: 8px; 
        }
        .clue-item { padding: 3px 0; font-size: 1.0rem; color: #ffffff; border-bottom: 1px solid #111; font-weight: 600; }
        .clue-item.correct { color: var(--neon-pink); font-weight: 600; text-shadow: 0 0 5px var(--neon-pink); }

        #success-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 3, 5, 0.98); backdrop-filter: blur(20px);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }

        @media (min-width: 768px) {
            #crossword-grid { grid-template-columns: repeat(15, 42px); grid-template-rows: repeat(15, 42px); }
            #game-container { flex-direction: row; align-items: flex-start; }
            .clues-wrapper { grid-template-columns: 1fr; width: 280px; border-top: none; border-left: 1px solid var(--neon-pink); }

<body>

    <header id="main-header">
        <h1>THAI VOCAB</h1>
        <div class="controls">
            <button class="btn" onclick="resetGame()">NEW GAME</button>
            <button class="btn" id="manifest-btn" onclick="toggleManifest()" style="border-color:#444; color:#444;">CHEAT</button>
            <a href="https://yournerdythaitutor.github.io/Lessons/" target="_blank" class="btn btn-study">STUDY THAI</a>
        </div>
    </header>

    <div id="game-container">
        <div id="crossword-grid"></div>
        <div class="clues-wrapper">
            <div>
                <div class="clue-section-header">ACROSS</div>
                <div id="across-clues"></div>
            </div>
            <div>
                <div class="clue-section-header">DOWN</div>
                <div id="down-clues"></div>
            </div>
        </div>
    </div>

    <div id="success-overlay">
        <h2 style="font-family: 'Syncopate'; color: var(--neon-pink); font-size: 3rem; margin: 0;">CONGRATS</h2>
        <p style="letter-spacing: 4px; color: var(--neon-cyan); margin-bottom: 30px;">PUZZLE CLEARED</p>
        <button class="btn" onclick="closeWin()">ClOSE</button>
    </div>

<script>
const SIZE = 15;
const MAX_WORDS = 15;
const MIN_WORDS = 5;
let currentPlaced = [];
let manifestActive = false;

function splitThaiStrict(w) {
    return w.match(/[\u0E00-\u0E7F][\u0E31\u0E34-\u0E3A\u0E47-\u0E4E]*|[\u0E30-\u0E33\u0E40-\u0E46]/g) || [];
}

function isPureConsonant(char) {
    if (!char || char.length > 1) return false;
    const code = char.charCodeAt(0);
    return (code >= 0x0E01 && code <= 0x0E2E);
}

// THE NEW RESET LOGIC
function resetGame() {
    const container = document.getElementById('game-container');
    const overlay = document.getElementById('success-overlay');
    
    // UI Feedback
    container.style.opacity = '0';
    overlay.style.display = 'none';
    
    // Short delay to allow opacity to fade before rebuilding
    setTimeout(() => {
        generate();
        container.style.opacity = '1';
        // Reset manifest state
        manifestActive = false;
        document.getElementById('manifest-btn').style.color = '#444';
        document.getElementById('manifest-btn').style.borderColor = '#444';
    }, 400);
}

function closeWin() {
    const overlay = document.getElementById('success-overlay');
    overlay.style.display = 'none';
}

function generate() {
    const allWords = vocabWords.trim().split('\n').map(line => {
        const [word, clue] = line.split(',');
        return { full: word.trim(), split: splitThaiStrict(word.trim()), clue: clue.trim() };
    });

    let grid, placed;
    let attempts = 0;

    while (attempts < 1000) {
        grid = Array(SIZE).fill().map(() => Array(SIZE).fill(null));
        placed = [];
        let pool = [...allWords].sort(() => Math.random() - 0.5);
        const first = pool.pop();
        addWordToGrid(first, 7, 3, 'across', grid, placed);

        for (let pass = 0; pass < 20; pass++) {
            if (placed.length >= MAX_WORDS) break;
            for (let i = 0; i < pool.length; i++) {
                if (tryToFit(pool[i], grid, placed)) {
                    pool.splice(i, 1);
                    i--;
                }
            }
        }
        if (placed.length >= MIN_WORDS) break;
        attempts++;
    }
    render(grid, placed);
}

// Path logic remains strict as requested
function tryToFit(wordObj, grid, placed) {
    const chars = wordObj.split;
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            if (grid[r][c] && isPureConsonant(grid[r][c].char)) {
                for (let i = 0; i < chars.length; i++) {
                    if (chars[i] === grid[r][c].char) {
                        if (checkPath(chars, r - i, c, 'down', grid, i)) {
                            addWordToGrid(wordObj, r - i, c, 'down', grid, placed);
                            return true;
                        }
                        if (checkPath(chars, r, c - i, 'across', grid, i)) {
                            addWordToGrid(wordObj, r, c - i, 'across', grid, placed);
                            return true;
                        }
                    }
                }
            }
        }
    }
    return false;
}

function checkPath(chars, r, c, dir, grid, intersectIndex) {
    if (r < 0 || c < 0 || (dir === 'across' && c + chars.length > SIZE) || (dir === 'down' && r + chars.length > SIZE)) return false;
    const bR = dir === 'down' ? r - 1 : r, bC = dir === 'across' ? c - 1 : c;
    const aR = dir === 'down' ? r + chars.length : r, aC = dir === 'across' ? c + chars.length : c;
    if (bR >= 0 && bC >= 0 && grid[bR][bC]) return false;
    if (aR < SIZE && aC < SIZE && grid[aR][aC]) return false;
    let intersections = 0;
    for (let i = 0; i < chars.length; i++) {
        const cR = dir === 'across' ? r : r + i, cC = dir === 'across' ? c + i : c;
        if (grid[cR][cC]) {
            if (i !== intersectIndex || grid[cR][cC].char !== chars[i]) return false;
            intersections++;
        } else {
            const ns = dir === 'across' ? [[cR - 1, cC], [cR + 1, cC]] : [[cR, cC - 1], [cR, cC + 1]];
            for (const [nr, nc] of ns) { if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && grid[nr][nc]) return false; }
        }
    }
    return intersections === 1;
}

function addWordToGrid(wordObj, r, c, dir, grid, placed) {
    const chars = wordObj.split;
    for (let i = 0; i < chars.length; i++) {
        const row = dir === 'across' ? r : r + i, col = dir === 'across' ? c + i : c;
        if (!grid[row][col]) grid[row][col] = { char: chars[i], num: null };
    }
    if (!grid[r][c].num) grid[r][c].num = Math.max(0, ...placed.map(p => p.num)) + 1;
    placed.push({ ...wordObj, r, c, dir, num: grid[r][c].num });
}

function render(grid, placed) {
    currentPlaced = placed;
    const container = document.getElementById('crossword-grid');
    container.innerHTML = '';
    for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell ' + (grid[r][c] ? '' : 'black');
            if (grid[r][c]) {
                if (grid[r][c].num) cell.innerHTML = `<span class="num">${grid[r][c].num}</span>`;
                const input = document.createElement('input');
                input.dataset.r = r; input.dataset.c = c;
                input.dataset.ans = grid[r][c].char;
                input.oninput = checkWin;
                cell.appendChild(input);
            }
            container.appendChild(cell);
        }
    }
    const ac = document.getElementById('across-clues'), dn = document.getElementById('down-clues');
    ac.innerHTML = ''; dn.innerHTML = '';
    placed.sort((a,b) => a.num - b.num).forEach(p => {
        const div = document.createElement('div');
        div.className = 'clue-item';
        div.id = `clue-${p.num}-${p.dir}`;
        div.innerText = `${p.num}. ${p.clue}`;
        (p.dir === 'across' ? ac : dn).appendChild(div);
    });
}

function checkWin() {
    let allOk = true;
    currentPlaced.forEach(p => {
        let user = "";
        for (let i = 0; i < p.split.length; i++) {
            const row = p.dir === 'across' ? p.r : p.r + i, col = p.dir === 'across' ? p.c + i : p.c;
            user += document.querySelector(`input[data-r="${row}"][data-c="${col}"]`).value;
        }
        const isMatch = (user === p.full);
        document.getElementById(`clue-${p.num}-${p.dir}`).classList.toggle('correct', isMatch);
        if (!isMatch) allOk = false;
    });
    if (allOk) document.getElementById('success-overlay').style.display = 'flex';
}

function toggleManifest() {
    manifestActive = !manifestActive;
    const btn = document.getElementById('manifest-btn');
    btn.style.color = manifestActive ? 'var(--neon-cyan)' : '#444';
    btn.style.borderColor = manifestActive ? 'var(--neon-cyan)' : '#444';
    document.querySelectorAll('input').forEach(i => i.placeholder = manifestActive ? i.dataset.ans : "");
}

window.onload = generate;
</script>
</body>
</html>

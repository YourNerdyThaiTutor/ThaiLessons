<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <title>Thai Hangman Vocab</title>
    <script src="assets/vocabWords.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --soft-cream: #fcfaf2;
            --petal-pink: #ffc2d1;
            --lavender: #e2afff;
            --matcha: #b7e4c7;
            --charcoal: #2d2d2d;
            --thai-font: "Leelawadee UI", "Tahoma", sans-serif;
        }

        body {
            background: var(--soft-cream);
            color: var(--charcoal);
            font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }

        #top-nav {
            width: 100%; max-width: 850px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }

        .nav-btn {
            background: white; border: 1px solid var(--lavender);
            padding: 8px 15px; border-radius: 50px; cursor: pointer;
            font-family: 'Syncopate'; font-size: 0.6rem; color: var(--lavender);
        }

        #hangman-container {
            display: flex; flex-direction: column; align-items: center;
            margin-bottom: 25px; min-height: 200px; 
        }

        #body-grid {
            display: grid; grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(3, 60px); gap: 5px; font-size: 2.8rem;
            align-items: center; justify-items: center;
        }

        .part { opacity: 0; transition: opacity 0.3s ease; }
        .part.visible { opacity: 1; }
        .grid-hat { grid-column: 2; grid-row: 1; }
        .grid-torso { grid-column: 2; grid-row: 2; }
        .grid-arm-l { grid-column: 1; grid-row: 2; }
        .grid-arm-r { grid-column: 3; grid-row: 2; }
        .grid-leg-l { grid-column: 1; grid-row: 3; }
        .grid-leg-r { grid-column: 3; grid-row: 3; }

        #word-display {
            display: flex; justify-content: center; flex-wrap: wrap;
            gap: 15px; margin: 20px 0; font-family: var(--thai-font); font-size: 3.5rem;
        }

        .cluster-box {
            position: relative; 
            min-width: 55px; 
            height: 100px;
            border-bottom: 3px solid #ccc; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        .thai-cluster-content {
            position: absolute;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #definition-box {
            background: white; padding: 15px 25px; border-radius: 20px;
            border: 2px solid var(--petal-pink); font-size: 0.8rem;
            width: 100%; max-width: 320px; text-align: center; margin-bottom: 20px;
        }

        .kb-section { width: 100%; max-width: 850px; margin-bottom: 15px; }
        .kb-label { font-family: 'Syncopate'; font-size: 0.55rem; color: var(--lavender); margin-bottom: 5px; display: block; }
        .keyboard { display: grid; grid-template-columns: repeat(11, 1fr); gap: 5px; }
        
        .key {
            background: white; border: 1px solid #eee; padding: 12px 0;
            font-family: var(--thai-font); font-size: 1.1rem; cursor: pointer; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .key.used { opacity: 0.3; pointer-events: none; }
        .key.wrong { background: var(--lavender); color: white; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(252, 250, 242, 0.99) !important;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000 !important; text-align: center; padding: 20px;
        }

        .stats-list { text-align: left; max-width: 400px; width: 100%; overflow-y: auto; max-height: 50vh; margin: 10px 0; }
        .stat-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 0.9rem; }

        @media (max-width: 600px) {
            .keyboard { grid-template-columns: repeat(6, 1fr); }
            #word-display { font-size: 2.5rem; }
            .cluster-box { min-width: 40px; height: 80px; }
        }
    </style>
</head>
<body>

    <div id="top-nav">
        <div style="display: flex; gap: 10px;">
            <button class="nav-btn" onclick="toggleStats(true)">📊 STATS</button>
            <button class="nav-btn" style="border-color:var(--matcha); color:var(--matcha);" onclick="window.open('https://yournerdythaitutor.github.io/Lessons/', '_blank')">📖 STUDY</button>
        </div>
        <div style="font-family:'Syncopate'; font-size: 0.6rem; color: var(--lavender);">
            WIN RATE: <span id="global-win-rate">0%</span>
        </div>
    </div>

    <div id="hangman-container">
        <div id="body-grid">
            <span class="part grid-hat" id="p-0"></span>
            <span class="part grid-torso" id="p-1"></span>
            <span class="part grid-arm-l" id="p-2"></span>
            <span class="part grid-arm-r" id="p-3"></span>
            <span class="part grid-leg-l" id="p-4"></span>
            <span class="part grid-leg-r" id="p-5"></span>
        </div>
    </div>

    <div id="definition-box">
        <span style="font-weight:800; color:var(--petal-pink)">DEFINITION:</span><br>
        <span id="word-def">...</span>
    </div>

    <div id="word-display"></div>
    
    <div class="kb-section">
        <span class="kb-label">Consonants</span>
        <div class="keyboard" id="kb-consonants"></div>
    </div>
    <div class="kb-section">
        <span class="kb-label">Vowels & Tones</span>
        <div class="keyboard" id="kb-details"></div>
    </div>

    <div id="game-overlay" class="overlay">
        <h2 id="result-title">YOU WIN</h2>
        <div id="result-info" style="margin-bottom:25px; line-height:1.6; font-size: 1rem;"></div>
        <button onclick="initGame()" class="nav-btn" style="padding:15px 40px; background:var(--charcoal); color:white; border:none;">NEXT WORD</button>
    </div>

    <div id="stats-overlay" class="overlay">
        <h2 style="font-size:1.5rem; font-family:'Syncopate'">STATS VAULT</h2>
        <div class="stats-list" id="stats-container"></div>
        <button onclick="toggleStats(false)" class="nav-btn" style="margin-top:20px;">CLOSE</button>
    </div>

<script>
    let targetWord = "", definition = "";
    let splitWord = [], guessedChars = [], mistakes = 0;
    let isGameOver = false;

    const consonantsList = "กขฃคฅฆงจฉชซฌญฎฏฐฑฒณดตถทธนบปผฝพฟภมยรลวศษสหฬอฮ";

    function getThaiClusters(w) {
        return w.match(/[\u0E00-\u0E7F][\u0E31\u0E34-\u0E3A\u0E47-\u0E4E]*|[\u0E30-\u0E33\u0E40-\u0E46]/g) || [];
    }

    function initGame() {
        isGameOver = false;
        const list = (typeof vocabWords !== 'undefined') ? vocabWords.trim().split('\n') : ["ภาษา,Language"];
        const pair = list[Math.floor(Math.random() * list.length)].split(',');
        targetWord = pair[0].trim();
        definition = pair[1] ? pair[1].trim() : "???";
        
        console.log("Cheat Sheet:", targetWord);

        splitWord = getThaiClusters(targetWord);
        guessedChars = []; mistakes = 0;
        
        document.getElementById('word-def').innerText = definition;
        document.getElementById('game-overlay').style.display = 'none';
        document.getElementById('stats-overlay').style.display = 'none';
        
        resetHangman();
        updateGlobalWinRate();
        renderWord();
        renderKeyboards();
    }

    function resetHangman() {
        const parts = ["👒","👚","💅","💅","🩰","🩰"];
        for(let i=0; i<6; i++) {
            const el = document.getElementById(`p-${i}`);
            el.innerText = parts[i];
            el.classList.remove('visible');
        }
    }

    function renderWord() {
        const display = document.getElementById('word-display');
        display.innerHTML = "";
        let allWon = true;

        splitWord.forEach(cluster => {
            const box = document.createElement('div');
            box.className = 'cluster-box';

            const chars = cluster.split("");
            const base = chars.find(c => consonantsList.includes(c));
            const baseGuessed = base && guessedChars.includes(base);
            
            // Build the visible string for this specific cluster
            let visibleClusterString = "";
            let anyPartGuessed = false;

            chars.forEach(char => {
                if (guessedChars.includes(char)) {
                    anyPartGuessed = true;
                } else {
                    allWon = false;
                }
            });

            if (anyPartGuessed) {
                const content = document.createElement('span');
                content.className = 'thai-cluster-content';
                
                // Construct logic: 
                // 1. Start with base (consonant) or dotted circle
                let clusterBuild = baseGuessed ? base : "\u25CC";
                
                // 2. Add only the guessed marks/vowels to that base
                chars.forEach(char => {
                    if (char !== base && guessedChars.includes(char)) {
                        clusterBuild += char;
                    }
                });

                content.innerText = clusterBuild;
                box.appendChild(content);
            }

            display.appendChild(box);
        });

        if (allWon && !isGameOver && targetWord !== "") end(true);
    }

    function handleGuess(char, btn) {
        if (isGameOver || guessedChars.includes(char)) return;
        guessedChars.push(char);
        btn.classList.add('used');

        if (targetWord.includes(char)) {
            renderWord();
        } else {
            const el = document.getElementById(`p-${mistakes}`);
            if(el) el.classList.add('visible');
            mistakes++;
            btn.classList.add('wrong');
            if (mistakes >= 6) end(false);
        }
    }

    function end(win) {
        isGameOver = true;
        const overlay = document.getElementById('game-overlay');
        const title = document.getElementById('result-title');
        const info = document.getElementById('result-info');

        let stats = JSON.parse(localStorage.getItem('thaiStats')) || { wins: 0, total: 0, words: {} };
        if (!stats.words) stats.words = {};
        if (!stats.words[targetWord]) stats.words[targetWord] = { got: 0, seen: 0 };

        stats.total++;
        stats.words[targetWord].seen++;
        if (win) { stats.wins++; stats.words[targetWord].got++; }
        localStorage.setItem('thaiStats', JSON.stringify(stats));

        title.innerText = win ? "YOU WIN" : "YOU LOSE";
        title.style.color = win ? "var(--matcha)" : "var(--petal-pink)";
        info.innerHTML = `Word: <b style="font-family:var(--thai-font); font-size:1.5rem;">${targetWord}</b><br><i>"${definition}"</i>`;
        overlay.style.display = 'flex';
        updateGlobalWinRate();
    }

    function updateGlobalWinRate() {
        const stats = JSON.parse(localStorage.getItem('thaiStats')) || { wins: 0, total: 0 };
        const rateEl = document.getElementById('global-win-rate');
        if (stats.total > 0) {
            rateEl.innerText = Math.round((stats.wins / stats.total) * 100) + "%";
        }
    }

    function toggleStats(show) {
        const overlay = document.getElementById('stats-overlay');
        if (!show) { overlay.style.display = 'none'; return; }
        overlay.style.display = 'flex';
        
        const stats = JSON.parse(localStorage.getItem('thaiStats')) || { words: {} };
        const container = document.getElementById('stats-container');
        container.innerHTML = "";
        
        const sorted = Object.entries(stats.words || {}).map(([word, data]) => {
            return { word, ...data, acc: Math.round((data.got / data.seen) * 100) };
        }).sort((a, b) => a.acc - b.acc);

        sorted.forEach(item => {
            const el = document.createElement('div');
            el.className = 'stat-item';
            el.innerHTML = `<span style="font-family:var(--thai-font)">${item.word}</span> <span>${item.acc}% Accuracy</span>`;
            container.appendChild(el);
        });
    }

    function renderKeyboards() {
        const setup = (id, list) => {
            const el = document.getElementById(id);
            el.innerHTML = "";
            list.split("").forEach(c => {
                const b = document.createElement('button');
                b.className = 'key'; b.innerText = c;
                b.onclick = () => handleGuess(c, b);
                el.appendChild(b);
            });
        };
        setup('kb-consonants', "กขฃคฅฆงจฉชซฌญฎฏฐฑฒณดตถทธนบปผฝพฟภมยรลวศษสหฬอฮ");
        // Fixed duplicates in the vowel/tone string
        setup('kb-details', "ะาำิีึืเแโใไ็่้๊๋์ํัุู");
    }

    window.onload = initGame;
</script>
</body>
</html>

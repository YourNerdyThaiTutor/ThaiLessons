        <meta charset="UTF-8" />
        <title>Where does the vowel go Lesson 6</title>
        <style>
.box {
  float: left;
  width: 100px;
  height: 100px;
  margin: 10px;
  padding: 10px;
  border: 1px solid black;
  text-align: center;
}
.box {
  padding: 5px 5px;
  border-radius: 15px;
  cursor: pointer;
  border: 0;
  background-color: white;
  box-shadow: rgb(0 0 0 / 5%) 0 0 8px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-size: 30px;
  transition: all 0.5s ease;
}

.box:hover {
  letter-spacing: 3px;
  background-color: hsl(261deg 80% 48%);
  color: hsl(0, 0%, 100%);
  box-shadow: rgb(93 24 220) 0px 7px 29px 0px;
}

.box:active {
  letter-spacing: 3px;
  background-color: hsl(261deg 80% 48%);
  color: hsl(0, 0%, 100%);
  box-shadow: rgb(93 24 220) 0px 0px 0px 0px;
  transform: translateY(10px);
  transition: 100ms;
}            
.con{
    font-size: 100px;
    text-align: center;
}
.dragElement, .dropZone {
  width: 12rem;
  height: 15rem;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  background: rgba( 255, 255, 255, 0.9 );
backdrop-filter: blur( 4px );
-webkit-backdrop-filter: blur( 4px );
border-radius: 10px;
  transition: 0.3s;
}

.dropZone {
  width: 13rem;
  height: 16rem;
  background: rgba( 0, 0, 0, 0.7 );
backdrop-filter: blur( 4.5px );
-webkit-backdrop-filter: blur( 4.5px );
border-radius: 10px;
}

.beingDragged {
 color: white;
  background-color: #9d9d9d;
}

.hoverOver {
  transition: 0.3s ease-out;
  border: solid 5px #2a9d8f;
}

#Draggable {
  touch-action: none; /* Prevents scrolling while dragging */
  user-select: none;
  position: relative; /* Allows manual movement */
  z-index: 1000;
}
            
</style>
    <script>
        var streak = 0;
        var answer="เ";
        var vowels = {
         "ะ":"right",
         "ิ":"above",
         "ึ":"above",
         "ุ":"under"
        };

        let isDragging = false;
        let startX, startY;


        function generateQuestion(){
         document.getElementById("streak").textContent = "streak: "+streak;
         var c = Math.floor(Math.random() * consonants.length);
         var v = Math.floor(Math.random() * vowels_list.length);
         document.getElementById("consonant").innerHTML = consonants[c];
         answer = vowels_list[v];
         document.getElementById("Draggable").innerHTML = answer;
     }
function dragstartHandler(ev) {
  ev.dataTransfer.setData("text", ev.target.id);
    ev.target.classList.add('beingDragged');
}
function SetPage(){
    document.body.innerHTML=`
<h1>Drag and drop the vowel to the correct placement</h1>

<p id="streak">Streak: 0</p>      
        

        
    <table>
        <tr>
            <td></td>
            <td><div id="above" class = "box" ondrop="dropHandler(event)"   ondragover="dragoverHandler(event)"></div></td>
            <td></td>
        </tr>
        <tr>
            <td><div id="left"  class="box" ondrop="dropHandler(event)"   ondragover="dragoverHandler(event)"></div></td>
            <td class="con" id="consonant"></td>
            <td><div id="right"  class="box" ondrop="dropHandler(event)"   ondragover="dragoverHandler(event)"></div></td>
        </tr>
        <tr>
            <td></td>
            <td><div id="under"  class="box" ondrop="dropHandler(event)"   ondragover="dragoverHandler(event)"></div></td>
            <td></td>
        </tr>
    </table>
    <div id="div1" class="box" ondrop="dropHandler(event)"   ondragover="dragoverHandler(event)">

            <div id="Draggable" src="img_w3slogo.gif" draggable="true" class="con" ondragstart="dragstartHandler(event)" width="100" height="100">Sa</div>
        </div>`;
    const draggable = document.getElementById("Draggable");
    
    draggable.onpointerdown = onPointerDown;
    draggable.onpointermove = onPointerMove;
    draggable.onpointerup = onPointerUp;
    draggable.onpointercancel = onPointerUp; // Safety for when touch is interrupted
    
    generateQuestion();
}
function onPointerDown(ev) {
    isDragging = true;
    startX = ev.clientX;
    startY = ev.clientY;
    ev.target.setPointerCapture(ev.pointerId); // Keeps tracking the finger even if it leaves the element
    ev.target.classList.add('beingDragged');
}

function onPointerMove(ev) {
    if (!isDragging) return;

    const el = ev.target;
    // Calculate movement
    const dx = ev.clientX - startX;
    const dy = ev.clientY - startY;

    el.style.transform = `translate(${dx}px, ${dy}px)`;
    
    // Check if we are hovering over a drop zone
    const target = getDropZoneUnderPointer(ev.clientX, ev.clientY);
    
    // Clear previous highlights
    document.querySelectorAll('.box').forEach(b => b.classList.remove('hoverOver'));
    if (target && target.classList.contains('box') && target.id !== 'div1') {
        target.classList.add('hoverOver');
    }
}

function onPointerUp(ev) {
    if (!isDragging) return;
    isDragging = false;
    
    const el = ev.target;
    const dropZone = getDropZoneUnderPointer(ev.clientX, ev.clientY);
    
    el.style.transform = 'none'; // Reset position
    el.classList.remove('beingDragged');

    if (dropZone && dropZone.classList.contains('box') && dropZone.id !== 'div1') {
        handleDropLogic(dropZone, el);
    }
}

function getDropZoneUnderPointer(x, y) {
    // Hide the element temporarily to see what is underneath it
    const el = document.getElementById("Draggable");
    el.style.display = 'none';
    const target = document.elementFromPoint(x, y);
    el.style.display = 'flex';
    return target;
}

function handleDropLogic(targetZone, draggableEl) {
    targetZone.appendChild(draggableEl);
    
    if (vowels[answer] === targetZone.id) {
        targetZone.style.background = '#00ff00';
        streak++;
        updateStreakLocalStorage(streak);
        setTimeout(() => SetPage(), 700);
    } else {
        targetZone.style.background = '#ff003c';
        streak = -1;
        document.getElementById("streak").textContent = "streak: 0";
    }
}

function dragoverHandler(ev) {
  ev.preventDefault();
}

function dropHandler(ev) {
  ev.preventDefault();
  const data = ev.dataTransfer.getData("text");
  ev.target.appendChild(document.getElementById(data));
    document.getElementById(data).classList.remove('beingDragged');
    ev.target.classList.remove('hoverOver');
    if(vowels[answer]==ev.target.id){
        document.getElementById(ev.target.id).style.background='#00ff00';
        streak++;
        updateStreakLocalStorage(streak)
        
        setTimeout(() => SetPage(),700);
    }
    else{
        document.getElementById(ev.target.id).style.background='#ff003c';
        streak = -1;
    } 
}

  function updateStreakLocalStorage(streak){

    try{

      const url = window.location.href; 
      const filename = url.substring(url.lastIndexOf('/') + 1); // ex: "Lesson1.html"
      const lessonName = filename.replace('.html', '');         //ex: "Lesson1"

      let gameData = localStorage.getItem(lessonName)

      if(!gameData){
          //initialize it
          gameData = "0"
      }

      //turn string into Number and increment
      gameData = Number(gameData)
      gameData = streak > gameData ? streak : gameData   
      localStorage.setItem(lessonName + "Streak", gameData.toString())

    }catch{
      console.log("couldn't get url name")
    }
  }

     var vowels_list=["ะ","ิ","ึ","ุ"]
     var consonants =["ก","จ","ด","ต","บ","ป","อ","ง","ญ","น","ย","ณ","ร","ว","ม","ฬ","ล"];
     window.onload = function load(){
         SetPage();
         
         
     }
     
</script>
